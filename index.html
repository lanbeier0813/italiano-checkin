<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="意大利语打卡">
<meta name="theme-color" content="#009246">
<link rel="manifest" href="/italiano-checkin/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/italiano-checkin/icon-192.png">
<link rel="apple-touch-icon" href="/italiano-checkin/icon-192.png">
<title>🇮🇹 意大利语暑期打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Helvetica Neue',sans-serif;background:linear-gradient(135deg,#f0f4f0,#e8f0e3 50%,#f5f0e8);min-height:100vh;min-height:-webkit-fill-available;color:#2c3e2d;padding-bottom:80px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.container{max-width:500px;margin:0 auto;padding:16px;padding-bottom:20px}
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:-webkit-fill-available;padding:20px}
.auth-card{background:#fff;border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.auth-card .logo{text-align:center;font-size:48px;margin-bottom:8px}
.auth-card h1{text-align:center;font-size:20px;margin-bottom:4px;color:#009246}
.auth-card .sub{text-align:center;font-size:12px;color:#999;margin-bottom:24px}
.auth-card label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#555}
.auth-card input{width:100%;padding:12px 14px;border:2px solid #e8e8e8;border-radius:12px;font-size:15px;margin-bottom:16px;outline:none;transition:border .2s;-webkit-appearance:none}
.auth-card input:focus{border-color:#009246}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;-webkit-appearance:none}
.btn-primary{background:linear-gradient(135deg,#009246,#00b359);color:#fff}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-outline{background:#fff;color:#009246;border:2px solid #009246;margin-top:10px}
.btn-outline:active{background:#f0faf3}
.switch{text-align:center;margin-top:16px;font-size:13px;color:#888}
.switch a{color:#009246;font-weight:600;cursor:pointer;text-decoration:none}
.error{color:#ce2b37;font-size:12px;text-align:center;margin-bottom:8px;min-height:18px}
.page{display:none}
.page.active{display:block}
.header{background:linear-gradient(135deg,#009246,#008C3A 40%,#ce2b37 40%,#ce2b37 60%,#fff 60%,#fff);border-radius:20px;padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,146,70,.2)}
.header::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);backdrop-filter:blur(2px)}
.header .hc{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.user-tag{font-size:11px;color:rgba(255,255,255,.85)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid #eee;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(0,0,0,.05)}
.bottom-nav .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;cursor:pointer;color:#999;font-size:9px;gap:3px;transition:all .15s;-webkit-tap-highlight-color:transparent;border:none;background:none}
.bottom-nav .nav-item .nav-icon{font-size:18px;line-height:1}
.bottom-nav .nav-item.active{color:#009246;font-weight:600}
.bottom-nav .nav-item:active{opacity:.6}
.stats-row{display:flex;gap:10px;margin-bottom:16px}
.stat-card{flex:1;background:#fff;border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat-card .icon{font-size:24px;margin-bottom:2px}
.stat-card .number{font-size:26px;font-weight:700;color:#009246}
.stat-card.streak .number{color:#ce2b37}
.stat-card.flower .number{color:#e74c3c}
.stat-card .label{font-size:11px;color:#888;margin-top:2px}
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.task-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:12px;transition:all .2s}
.task-card .task-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.task-card .task-icon.hw{background:#e3f2fd}.task-card .task-icon.dt{background:#fff3e0}
.task-card .task-icon.rc{background:#f3e5f5}.task-card .task-icon.sp{background:#e8f5e9}
.task-info{flex:1;min-width:0}
.task-info .task-name{font-weight:700;font-size:14px}
.task-info .task-content{font-size:13px;color:#555;margin-top:6px;background:#f9f9f9;padding:10px 12px;border-radius:8px;line-height:1.6;word-break:break-all}
.checkin-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.checkin-row:last-child{border-bottom:none}
.checkin-row .ci-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.checkin-row .ci-name{flex:1;font-size:14px;font-weight:600}
.checkin-row .ci-status{font-size:12px;color:#888;margin-right:8px}
.check-btn{width:40px;height:40px;border-radius:50%;border:3px solid #ddd;background:#fff;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.check-btn:active{border-color:#009246;transform:scale(.92)}
.check-btn.done{background:#009246;border-color:#009246;color:#fff}
.podium-wrap{background:#fff;border-radius:20px;padding:24px 16px 16px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:16px}
.podium-wrap h3{text-align:center;font-size:16px;margin-bottom:20px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;min-height:180px}
.podium-col{display:flex;flex-direction:column;align-items:center;width:90px}
.podium-col .p-name{font-size:13px;font-weight:700;margin-bottom:4px;text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-col .p-flower{font-size:11px;color:#e74c3c;margin-bottom:4px}
.podium-col .p-bar{border-radius:10px 10px 0 0;width:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;transition:height .5s ease}
.podium-col.first .p-bar{background:linear-gradient(180deg,#ffd700,#ffb300);height:120px}
.podium-col.second .p-bar{background:linear-gradient(180deg,#c0c0c0,#9e9e9e);height:90px}
.podium-col.third .p-bar{background:linear-gradient(180deg,#cd7f32,#a0522d);height:65px}
.podium-col.empty .p-bar{background:#e0e0e0;height:40px}
.podium-col.first{order:2}.podium-col.second{order:1}.podium-col.third{order:3}
.student-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;margin-bottom:10px}
.student-card:active{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:scale(.98)}
.student-card .s-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.student-card .s-name{font-weight:700;font-size:15px}
.student-card .s-stats{display:flex;gap:16px;font-size:12px;color:#666}
.student-card .s-stats span{font-weight:600}
.student-card .s-today{display:flex;gap:6px;margin-top:8px}
.s-dot{width:10px;height:10px;border-radius:50%}
.s-dot.done{background:#009246}.s-dot.pending{background:#ddd}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;border-radius:14px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tab-btn{flex:1;padding:10px 6px;border:none;background:none;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;color:#888;transition:all .2s;-webkit-appearance:none}
.tab-btn.active{background:#009246;color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.chat-area{display:flex;flex-direction:column;height:calc(100vh - 220px);height:calc(100dvh - 220px);min-height:300px}
.chat-messages{flex:1;overflow-y:auto;padding:4px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.chat-msg{margin-bottom:10px;padding:0 4px}
.chat-msg .cm-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.chat-msg .cm-name{font-weight:700;font-size:12px}
.chat-msg .cm-role{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.chat-msg .cm-role.teacher{background:#fce4ec;color:#c62828}
.chat-msg .cm-role.student{background:#e3f2fd;color:#1565c0}
.chat-msg .cm-time{font-size:10px;color:#bbb;margin-left:4px}
.chat-msg .cm-body{background:#fff;display:inline-block;padding:8px 12px;border-radius:14px;font-size:14px;max-width:85%;word-break:break-word;line-height:1.5;box-shadow:0 1px 3px rgba(0,0,0,.05);user-select:none;-webkit-user-select:none;touch-action:manipulation}
.chat-msg .cm-body:active{filter:brightness(.96)}
.chat-msg.mine .cm-body{background:#dcf8c6}
.chat-msg.mine{text-align:right}
.chat-msg.mine .cm-header{justify-content:flex-end}
.chat-input-row{display:flex;gap:8px;align-items:center}
.chat-input-row input{flex:1;padding:10px 14px;border:2px solid #e8e8e8;border-radius:24px;font-size:14px;outline:none;-webkit-appearance:none;min-height:44px}
.chat-input-row input:focus{border-color:#009246}
.chat-input-row button{width:44px;height:44px;border-radius:50%;border:none;background:#009246;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.chat-input-row button:active{opacity:.8}
.chat-refresh{text-align:center;margin-bottom:6px;position:relative;z-index:2;pointer-events:auto}
.chat-refresh button{font-size:11px;color:#888;background:none;border:1px solid #ddd;padding:6px 14px;border-radius:12px;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;pointer-events:auto}
.task-editor{margin-bottom:16px}
.task-editor label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
.task-editor textarea{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;resize:vertical;min-height:60px;outline:none;margin-bottom:10px;font-family:inherit;line-height:1.5;-webkit-appearance:none}
.task-editor textarea:focus{border-color:#009246}
.task-editor .row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.task-editor select{flex:1;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;background:#fff;min-height:44px}
.task-editor select:focus{border-color:#009246}
.task-editor .row input[type=date]{flex:1;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;min-height:44px}
.task-editor .row input[type=date]:focus{border-color:#009246}
.task-editor .cat-label{font-size:13px;font-weight:700;color:#333;margin:8px 0 4px;display:flex;align-items:center;gap:6px}
.btn-sm{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;-webkit-appearance:none;min-height:40px}
.btn-sm:active{transform:scale(.95)}
.btn-sm.primary{background:#009246;color:#fff}
.btn-sm.danger{background:#fff;color:#ce2b37;border:1px solid #ce2b37}
.btn-sm.outline{background:#fff;color:#009246;border:1px solid #009246}
.settings-card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:14px}
.settings-card h4{font-size:14px;margin-bottom:12px}
.settings-card .hint{font-size:11px;color:#999;margin-top:6px;line-height:1.5}
.settings-card input{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;margin-bottom:10px}
.settings-card input:focus{border-color:#009246}
.settings-card .row{display:flex;gap:8px;align-items:flex-end}
.settings-card select{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;background:#fff;min-height:44px}
.user-list-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.role-tag{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600}
.role-tag.teacher{background:#fce4ec;color:#c62828}
.role-tag.student{background:#e3f2fd;color:#1565c0}
.empty-state{text-align:center;color:#bbb;padding:40px 20px;font-size:14px}
.empty-state .icon{font-size:48px;margin-bottom:10px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;z-index:999;pointer-events:none;white-space:nowrap;animation:slideDown .3s ease;max-width:90vw}
@keyframes slideDown{0%{top:-60px;opacity:0}100%{top:20px;opacity:1}}
.toast.hide{animation:slideUp .3s ease forwards}
@keyframes slideUp{0%{top:20px;opacity:1}100%{top:-60px;opacity:0}}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:998}
.confetti-piece{position:absolute;font-size:24px;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:997;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:14px;color:#888}
.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#009246;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.install-banner{display:none;background:#fff;border-radius:14px;padding:14px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);align-items:center;gap:12px}
.install-banner.show{display:flex}
.install-banner .ib-icon{font-size:36px}
.install-banner .ib-text{flex:1;font-size:13px;line-height:1.4}
.install-banner .ib-btn{white-space:nowrap;padding:8px 16px;background:#009246;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.footer{text-align:center;color:#bbb;font-size:11px;margin:20px 0 10px}
.sync-status{font-size:11px;color:#aaa;text-align:center;margin-top:6px}
.sync-status.error{color:#ce2b37}
.sync-status.ok{color:#009246}
.logout-danger{width:100%;padding:14px;background:#fff;color:#ce2b37;border:2px solid #ce2b37;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;-webkit-appearance:none}
.logout-danger:active{background:#fef2f2}
.submenu-toggle{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700;transition:all .15s}
.submenu-toggle:active{background:#f5f5f5}
.submenu-toggle .arrow{font-size:12px;color:#bbb;transition:transform .2s}
.submenu-toggle.open .arrow{transform:rotate(90deg)}
.submenu-body{display:none;background:#fafafa;border-radius:0 0 14px 14px;padding:0 18px 16px;margin-top:-14px;margin-bottom:14px}
.submenu-body.show{display:block}
.submenu-body .settings-card{box-shadow:none;margin-bottom:10px;background:#fff}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <span id="loadingText"></span>
</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="confettiContainer" class="confetti-container"></div>

<!-- LOGIN -->
<div class="page active" id="loginPage">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">🇮🇹</div>
      <h1 id="loginTitle"></h1>
      <div class="sub" id="loginSub"></div>
      <div class="error" id="loginError"></div>
      <label id="loginUserLabel"></label>
      <input type="text" id="loginUser" placeholder="" autocomplete="username" autocapitalize="none">
      <label id="loginPassLabel"></label>
      <input type="password" id="loginPass" placeholder="" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()"></button>
      <div class="switch"><span id="switchToRegister1"></span> <a onclick="showRegister()" id="switchToRegisterLink"></a></div>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div class="page" id="registerPage">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo">📝</div>
      <h1 id="regTitle"></h1>
      <div class="sub" id="regSub"></div>
      <div class="error" id="regError"></div>
      <label id="regUserLabel"></label>
      <input type="text" id="regUser" placeholder="" autocapitalize="none">
      <label id="regPassLabel"></label>
      <input type="password" id="regPass" placeholder="">
      <label id="regPass2Label"></label>
      <input type="password" id="regPass2" placeholder="">
      <button class="btn btn-primary" id="regBtn" onclick="doRegister()"></button>
      <div class="switch"><span id="switchToLogin1"></span> <a onclick="showLogin()" id="switchToLoginLink"></a></div>
    </div>
  </div>
</div>

<!-- TEACHER -->
<div class="page" id="teacherPage">
  <div class="container">
    <div class="install-banner" id="installBannerT">
      <span class="ib-icon">📲</span>
      <span class="ib-text" id="installBannerText"></span>
      <button class="ib-btn" id="installBannerBtn" onclick="installPWA()"></button>
    </div>
    <div class="header">
      <div class="hc">
        <div>
          <h1 id="teacherHeader"></h1>
          <div class="user-tag" id="teacherNameTag"></div>
        </div>
      </div>
    </div>
    <div id="teacherMain"></div>
    <div class="sync-status" id="syncStatus"></div>
  </div>
  <div class="bottom-nav" id="teacherNav">
    <button class="nav-item active" onclick="switchTeacherTab('students')"><span class="nav-icon">📊</span><span id="tnav_students"></span></button>
    <button class="nav-item" onclick="switchTeacherTab('tasks')"><span class="nav-icon">📝</span><span id="tnav_tasks"></span></button>
    <button class="nav-item" onclick="switchTeacherTab('podium')"><span class="nav-icon">🏆</span><span id="tnav_podium"></span></button>
    <button class="nav-item" onclick="switchTeacherTab('chat')"><span class="nav-icon">💬</span><span id="tnav_chat"></span></button>
    <button class="nav-item" onclick="switchTeacherTab('settings')"><span class="nav-icon">⚙️</span><span id="tnav_settings"></span></button>
  </div>
</div>

<!-- STUDENT -->
<div class="page" id="studentPage">
  <div class="container">
    <div class="install-banner" id="installBannerS">
      <span class="ib-icon">📲</span>
      <span class="ib-text" id="installBannerTextS"></span>
      <button class="ib-btn" id="installBannerBtnS" onclick="installPWA()"></button>
    </div>
    <div class="header">
      <div class="hc">
        <div>
          <h1 id="studentHeader"></h1>
          <div class="user-tag" id="studentNameTag"></div>
        </div>
      </div>
    </div>
    <div id="studentMain"></div>
  </div>
  <div class="bottom-nav" id="studentNav">
    <button class="nav-item active" onclick="switchStudentTab('tasks')"><span class="nav-icon">📝</span><span id="snav_tasks"></span></button>
    <button class="nav-item" onclick="switchStudentTab('podium')"><span class="nav-icon">🏆</span><span id="snav_podium"></span></button>
    <button class="nav-item" onclick="switchStudentTab('chat')"><span class="nav-icon">💬</span><span id="snav_chat"></span></button>
    <button class="nav-item" onclick="switchStudentTab('settings')"><span class="nav-icon">⚙️</span><span id="snav_settings"></span></button>
  </div>
</div>

<script>
// ===== i18n =====
const I18N = {
  'zh-CN': {
    loginTitle:'Il Mio Diario Estivo', loginSub:'意大利语暑期打卡', loginUserLabel:'用户名', loginPassLabel:'密码',
    loginBtn:'登 录', switchToRegister1:'还没有账号？', switchToRegisterLink:'注册学生账号',
    regTitle:'注册学生账号', regSub:'仅限学生注册', regUserLabel:'用户名', regPassLabel:'密码', regPass2Label:'确认密码',
    regBtn:'注 册', switchToLogin1:'已有账号？', switchToLoginLink:'返回登录',
    errorFill:'请输入用户名和密码', errorPassShort:'密码至少4位', errorPassMismatch:'两次密码不一致',

async function fetchSupabaseData(){
  const [users,daily,student,checkins,streaks,chat,hidden]=await Promise.all([
    supabaseRequest('app_users?select=*'),
    supabaseRequest('daily_tasks?select=*'),
    supabaseRequest('student_tasks?select=*'),
    supabaseRequest('checkins?select=*'),
    supabaseRequest('streaks?select=*'),
    supabaseRequest('chat_messages?select=*&created_at=gte.'+encodeURIComponent(getTodayStartISO())+'&order=created_at.asc'),
    supabaseRequest('hidden_chat_messages?select=*')
  ]);
  const data=getInitialData();data.users={};data.chatMessages=[];data.hiddenChatMessages={};data.deletedUsers=[];
  const deletedUsers=new Set();
  daily.forEach(t=>{if((t.task_date||'').startsWith(DELETED_USER_PREFIX))deletedUsers.add(decodeDeletedUsername(t.task_date));});
  data.deletedUsers=Array.from(deletedUsers);
  users.forEach(u=>{if(!deletedUsers.has(u.username))data.users[u.username]={password:u.password,role:u.role};});
  users.filter(u=>deletedUsers.has(u.username)).forEach(u=>{supabaseDeleteUser(u.username).catch(()=>{});});
  daily.forEach(t=>{
    if((t.task_date||'').startsWith(DELETED_USER_PREFIX))return;
    data.dailyTasks[t.task_date]={homework:t.homework||'',dictation:t.dictation||'',recite:t.recite||'',speaking:t.speaking||''};
  });
  student.forEach(t=>{if(!data.studentTasks[t.username])data.studentTasks[t.username]={};data.studentTasks[t.username][t.task_date]={homework:t.homework||'',dictation:t.dictation||'',recite:t.recite||'',speaking:t.speaking||''};});
  checkins.forEach(c=>{if(!data.checkins[c.username])data.checkins[c.username]={};data.checkins[c.username][c.checkin_date]={homework:!!c.homework,dictation:!!c.dictation,recite:!!c.recite,speaking:!!c.speaking};});
  streaks.forEach(s=>{data.streaks[s.username]={streak:s.streak||0,flowers:s.flowers||0,lastCheckinDate:s.last_checkin_date||null};});
  chat.forEach(m=>{data.chatMessages.push({id:m.id,username:m.username,role:m.role,message:m.message,timestamp:m.created_at});});
  hidden.forEach(h=>{if(!data.hiddenChatMessages[h.username])data.hiddenChatMessages[h.username]=[];data.hiddenChatMessages[h.username].push(h.message_key);});
  return normalizeData(data);
}

async function saveDataNow(msg,pending){

  else if(msg.includes('checkin'))await supabaseSaveCheckinsAndStreaks(pending);
  else if(msg.startsWith('编辑 '))await supabaseSaveTasks(pending);
  else if(msg.startsWith('聊天:')||msg.startsWith('聊天(重试):'))await supabaseSaveChatMessages(pending);
  else if(msg.startsWith('隐藏聊天:'))await supabaseSaveHiddenChatMessages(pending);
  else if(msg.startsWith('注册学生:')||msg.startsWith('添加教师:')||msg.startsWith('修改密码:'))await supabaseSaveOneUser(pending,msg.split(':').slice(1).join(':').trim());
  else if(msg.startsWith('同步本地注册:'))await supabaseSaveUsers(pending);
  else await supabaseSaveAll(pending);
  appData=pending;saveLocalData();
}

const LK='italiano_local_data';
function loadLocalData(){const r=localStorage.getItem(LK);return r?normalizeData(JSON.parse(r)):getInitialData();}
function saveLocalData(){localStorage.setItem(LK,JSON.stringify(appData));}
function clearLegacyPendingUsers(){localStorage.removeItem(PENDING_USERS_KEY);}
function removePendingUser(username){clearLegacyPendingUsers();}
function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms));}
function deletedUserKey(username){return DELETED_USER_PREFIX+encodeURIComponent(username);}
function decodeDeletedUsername(key){return decodeURIComponent((key||'').slice(DELETED_USER_PREFIX.length));}
function getDeletedUsers(data){
  const deleted=new Set((data&&data.deletedUsers)||[]);
  Object.keys((data&&data.dailyTasks)||{}).forEach(k=>{if(k.startsWith(DELETED_USER_PREFIX))deleted.add(decodeDeletedUsername(k));});
  return deleted;
}
function supabaseHeaders(extra={}){
  return Object.assign({'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},extra);
}
async function supabaseRequest(path,options={}){
  const url=SUPABASE_URL+'/rest/v1/'+path;
  const r=await fetch(url,Object.assign({},options,{headers:supabaseHeaders(options.headers||{})}));
  if(!r.ok)throw new Error('Supabase失败('+r.status+') '+await r.text());
  if(r.status===204)return null;
  const text=await r.text();
  return text?JSON.parse(text):null;
}
function taskRow(date,t){return{task_date:date,homework:t.homework||'',dictation:t.dictation||'',recite:t.recite||'',speaking:t.speaking||'',updated_at:new Date().toISOString()};}
function studentTaskRow(username,date,t){return{username,task_date:date,homework:t.homework||'',dictation:t.dictation||'',recite:t.recite||'',speaking:t.speaking||'',updated_at:new Date().toISOString()};}
async function supabaseUpsert(table,rows,onConflict){
  if(!rows||rows.length===0)return;
  await supabaseRequest(`${table}?on_conflict=${encodeURIComponent(onConflict)}`,{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(rows)});
}
async function supabaseGetUser(username){
  const rows=await supabaseRequest('app_users?select=*&username=eq.'+encodeURIComponent(username));
  return rows&&rows[0]?rows[0]:null;
}
async function supabaseSaveOneUser(data,username){
  const u=data.users&&data.users[username];
  if(!username||!u)throw new Error('用户数据不存在');
  if(getDeletedUsers(data).has(username))throw new Error('用户已删除');
  const row={username,password:u.password,role:u.role,updated_at:new Date().toISOString()};
  const saved=await supabaseRequest('app_users?on_conflict=username',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify([row])});
  if(!Array.isArray(saved)||saved.length===0)throw new Error('用户保存未生效');
  const check=await supabaseGetUser(username);
  if(!check||check.password!==u.password||check.role!==u.role)throw new Error('用户保存后复查失败');
}
async function supabaseSaveUsers(data){
  const deleted=getDeletedUsers(data);
  const rows=Object.entries(data.users).filter(([username])=>!deleted.has(username)).map(([username,u])=>({username,password:u.password,role:u.role,updated_at:new Date().toISOString()}));
  await supabaseUpsert('app_users',rows,'username');
}
async function supabaseDeleteUser(username){
  const name=encodeURIComponent(username);
  await supabaseUpsert('daily_tasks',[{task_date:deletedUserKey(username),homework:new Date().toISOString(),dictation:'deleted-user',recite:'',speaking:'',updated_at:new Date().toISOString()}],'task_date');
  await Promise.all([
    supabaseRequest('hidden_chat_messages?username=eq.'+name,{method:'DELETE'}),
    supabaseRequest('student_tasks?username=eq.'+name,{method:'DELETE'}),
    supabaseRequest('checkins?username=eq.'+name,{method:'DELETE'}),
    supabaseRequest('streaks?username=eq.'+name,{method:'DELETE'})
  ]);
  const deleted=await supabaseRequest('app_users?username=eq.'+name,{method:'DELETE',headers:{'Prefer':'return=representation'}});
  if(!Array.isArray(deleted)||deleted.length===0)throw new Error('用户删除未生效');
  const check=await supabaseRequest('app_users?select=username&username=eq.'+name);
  if(check&&check.length>0)throw new Error('用户仍存在');
}
async function supabaseClearOldChat(){
  const cutoff=encodeURIComponent(getTodayStartISO());
  await supabaseRequest('chat_messages?created_at=lt.'+cutoff,{method:'DELETE'});
  await supabaseRequest('hidden_chat_messages?hidden_at=lt.'+cutoff,{method:'DELETE'});
}
async function supabaseSaveTasks(data){
  const dailyRows=Object.entries(data.dailyTasks||{}).map(([date,t])=>taskRow(date,t));
  const studentRows=[];
  Object.entries(data.studentTasks||{}).forEach(([username,dates])=>Object.entries(dates||{}).forEach(([date,t])=>studentRows.push(studentTaskRow(username,date,t))));
  await supabaseUpsert('daily_tasks',dailyRows,'task_date');
  await supabaseUpsert('student_tasks',studentRows,'username,task_date');
}
async function supabaseSaveCheckinsAndStreaks(data){
  const checkinRows=[];
  Object.entries(data.checkins||{}).forEach(([username,dates])=>Object.entries(dates||{}).forEach(([date,c])=>checkinRows.push({username,checkin_date:date,homework:!!c.homework,dictation:!!c.dictation,recite:!!c.recite,speaking:!!c.speaking,updated_at:new Date().toISOString()})));
  const streakRows=Object.entries(data.streaks||{}).map(([username,s])=>({username,streak:s.streak||0,flowers:s.flowers||0,last_checkin_date:s.lastCheckinDate||null,updated_at:new Date().toISOString()}));
  await supabaseUpsert('checkins',checkinRows,'username,checkin_date');
  await supabaseUpsert('streaks',streakRows,'username');
}
async function supabaseSaveChatMessages(data){
  const rows=(data.chatMessages||[]).map(m=>({id:getChatMessageKey(m),username:m.username,role:m.role,message:m.message,created_at:m.timestamp||new Date().toISOString()}));
  await supabaseUpsert('chat_messages',rows,'id');
}
async function supabaseSaveHiddenChatMessages(data){
  const rows=[];
  Object.entries(data.hiddenChatMessages||{}).forEach(([username,keys])=>(keys||[]).forEach(message_key=>rows.push({username,message_key})));
  await supabaseUpsert('hidden_chat_messages',rows,'username,message_key');
}
async function supabaseSaveAll(data){
  await supabaseSaveUsers(data);
  await supabaseSaveTasks(data);
  await supabaseSaveCheckinsAndStreaks(data);
  await supabaseSaveChatMessages(data);
  await supabaseSaveHiddenChatMessages(data);
}

async function doRegister(){
  const u=document.getElementById('regUser').value.trim(), p=document.getElementById('regPass').value, p2=document.getElementById('regPass2').value;
  const e=document.getElementById('regError');e.textContent='';
  if(!u||!p){e.textContent=_('errorFill');return;}
  if(p.length<4){e.textContent=_('errorPassShort');return;}
  if(p!==p2){e.textContent=_('errorPassMismatch');return;}
  const reserved=['toni','antonio','admin','teacher'];
  if(reserved.includes(u.toLowerCase())){e.textContent=_('errorReserved');return;}
  showLoading(_('loading'));
  try{
    // 注册必须直连Supabase并通过写入后复查，避免出现“注册成功但登录不存在”。
    await fetchDataFromApi();
    if(!appData.chatMessages)appData.chatMessages=[];
      if(getDeletedUsers(appData).has(u)){e.textContent=_('errorDeletedUser');hideLoading();return;}
      if(appData.users[u]){e.textContent=_('errorUserExists');hideLoading();return;}
      const before=cloneData(appData);
      appData.users[u]={password:p,role:'student'};
      try{
        await saveData('注册学生:'+u);
        const saved=await supabaseGetUser(u);
        if(!saved||saved.password!==p||saved.role!=='student')throw new Error('注册后复查失败');
        appData=before;
        appData.users[u]={password:p,role:'student'};
        saveLocalData();
        removePendingUser(u);showToast(_('regSuccess'));
      }
    catch(x){
      appData=before;
      saveLocalData();
      e.textContent=x&&x.message==='用户已删除'?_('errorDeletedUser'):_('errorNetwork');
      hideLoading();
      return;
    }
    showLogin();document.getElementById('loginUser').value=u;hideLoading();
  }catch(x){e.textContent=_('errorNetwork');hideLoading();}
}

async function teacherToggleCheckin(name,key){
  const today=getToday();

function updateStudentStreak(name){
  const today=getToday();
  if(!appData.streaks[name])appData.streaks[name]={streak:0,flowers:0,lastCheckinDate:null};
  const s=appData.streaks[name];
  const y=new Date();y.setDate(y.getDate()-1);const ys=y.toISOString().split('T')[0];
  if(s.lastCheckinDate===ys)s.streak+=1;else if(s.lastCheckinDate===today)return;else s.streak=1;
  s.lastCheckinDate=today;
  if(s.streak>0&&s.streak%5===0){s.flowers+=1;saveLocalData();setTimeout(()=>showToast(_('flowerGot')),1500);}
}

        <input type="password" id="newPassword" placeholder="${_('settingsNewPassword')}">
        <input type="password" id="newPassword2" placeholder="${_('settingsNewPassword2')}">
        <button class="btn-sm primary" style="width:100%" onclick="changeOwnPassword()">${_('settingsChangePwdBtn')}</button>
      </div>
      <div class="settings-card"><h4>${_('settingsAddTeacher')}</h4><div class="row"><input type="text" id="newTeacherUser" placeholder="${_('settingsTeacherUser')}" style="flex:1" autocapitalize="none"><input type="password" id="newTeacherPass" placeholder="${_('settingsTeacherPass')}" style="flex:1"><button class="btn-sm primary" onclick="addTeacher()">${_('settingsAdd')}</button></div></div>
      <div class="settings-card"><h4>${_('settingsUsers')}</h4>${users.map(([name,info])=>`<div class="user-list-item"><div><b>${name}</b> <span class="role-tag ${info.role}">${info.role==='teacher'?_('settingsTeacher'):_('settingsStudent')}</span></div>${name!=='toni'?`<button class="btn-sm danger" onclick="deleteUser('${name}')">${_('settingsDelete')}</button>`:'<span style="font-size:11px;color:#999">'+_('settingsMainAdmin')+'</span>'}</div>`).join('')}</div>

async function saveToken(){
  return refreshCloudData();
}

async function refreshCloudData(){
  showLoading(_('syncing'));
  try{await fetchDataFromApi();updateSyncStatus(true);showToast(_('syncOK'));renderTeacherSettings(document.getElementById('teacherMain'));}
  catch(e){updateSyncStatus(false);showToast(_('syncFail'));}
  hideLoading();
}

function clearToken(){refreshCloudData();}

async function addTeacher(){
  const u=document.getElementById('newTeacherUser').value.trim(),p=document.getElementById('newTeacherPass').value;
  if(!u||!p){showToast(_('errorFill'));return;}
  if(p.length<4){showToast(_('errorPassShort'));return;}
  if(appData.users[u]){showToast(_('errorUserExists'));return;}
  const before=cloneData(appData);
  appData.users[u]={password:p,role:'teacher'};
  showLoading(_('syncing'));
  try{await saveData('添加教师:'+u);updateSyncStatus(true);}
  catch(e){appData=before;saveLocalData();updateSyncStatus(false);hideLoading();showToast(_('syncFail'));renderTeacherSettings(document.getElementById('teacherMain'));return;}
  hideLoading();
  showToast(_('teacherAdded'));renderTeacherSettings(document.getElementById('teacherMain'));
}

async function deleteUser(name){
  if(!confirm(_('confirmDeleteUser')+' "'+name+'"？'+_('confirmDeleteUserMsg')))return;
  const before=cloneData(appData);
  delete appData.users[name];delete appData.checkins[name];delete appData.streaks[name];
  if(appData.studentTasks)delete appData.studentTasks[name];
  showLoading(_('syncing'));
  try{await saveData('删除用户:'+name);updateSyncStatus(true);}
  catch(e){appData=before;saveLocalData();updateSyncStatus(false);hideLoading();showToast(_('syncFail'));renderTeacherSettings(document.getElementById('teacherMain'));return;}
  hideLoading();
  showToast(_('userDeleted'));renderTeacherSettings(document.getElementById('teacherMain'));
}

// ===== STUDENT =====
function showStudentPage(){
  showPage('studentPage');updateAllUIText();
  document.getElementById('studentNameTag').textContent=currentUser.username;
  switchStudentTab('tasks');
}

function switchStudentTab(tab){
  document.querySelectorAll('#studentNav .nav-item').forEach(b=>b.classList.remove('active'));
  const map={tasks:0,podium:1,chat:2,settings:3};
  document.querySelectorAll('#studentNav .nav-item')[map[tab]].classList.add('active');
  const main=document.getElementById('studentMain');
  if(tab==='tasks')renderStudentTasks(main);
  else if(tab==='podium'){if(chatTimer){clearInterval(chatTimer);chatTimer=null;}renderStudentPodium(main);}
  else if(tab==='chat'){renderChat(main);startChatPoll();}
  else if(tab==='settings'){if(chatTimer){clearInterval(chatTimer);chatTimer=null;}renderStudentSettings(main);}
}

}

// ===== SHARED: Podium =====
function renderPodiumHTML(){
  const students=Object.entries(appData.users).filter(([,v])=>v.role==='student');
  const ranked=students.map(([name])=>({name,flowers:(appData.streaks[name]||{}).flowers||0})).sort((a,b)=>b.flowers-a.flowers);
  const pos=['first','second','third'],medals=['🥇','🥈','🥉'];
  const cols=[];
  for(let i=0;i<3;i++){
    if(i<ranked.length&&ranked[i].flowers>0){cols.push(`<div class="podium-col ${pos[i]}"><div class="p-name">${medals[i]} ${ranked[i].name}</div><div class="p-flower">🌹×${ranked[i].flowers}</div><div class="p-bar">${i+1}</div></div>`);}
    else{cols.push(`<div class="podium-col ${pos[i]} empty"><div class="p-name">${medals[i]} ${_('podiumEmpty')}</div><div class="p-flower">--</div><div class="p-bar">${i+1}</div></div>`);}
  }
  return `<div class="podium-wrap"><h3>${_('podiumTitle')}</h3><div class="podium">${cols[1]}${cols[0]}${cols[2]}</div><div style="text-align:center;margin-top:8px;font-size:11px;color:#888">${_('podiumHint')}</div></div>`;
}

// ===== SHARED: Chat =====
function renderChat(main){
  main.innerHTML=`<div class="chat-area"><div class="chat-refresh"><button type="button" onclick="refreshChat();return false;">${_('chatRefresh')}</button></div><div class="chat-messages" id="chatMessages"><div class="empty-state" style="padding:20px"><div class="icon">💬</div>${_('chatEmpty')}</div></div><div class="chat-input-row"><input type="text" id="chatInput" placeholder="${_('chatPlaceholder')}" maxlength="500" onkeydown="if(event.key==='Enter')sendChat()"><button type="button" onclick="sendChat()">➤</button></div></div><div style="text-align:center;color:#ccc;font-size:10px;margin-top:6px">${_('chatGroupHint')}</div>`;
  renderChatMessages();
}

function renderChatMessages(){
  const el=document.getElementById('chatMessages');if(!el)return;
  const msgs=appData.chatMessages||[];
  const hidden=getHiddenChatSet();
  const visible=msgs.map((m,idx)=>({m,idx})).filter(x=>!hidden.has(getChatMessageKey(x.m))).slice(-100);
  if(visible.length===0){el.innerHTML='<div class="empty-state" style="padding:20px"><div class="icon">💬</div>'+_('chatEmpty')+'</div>';return;}
  el.innerHTML=visible.map(({m,idx})=>{
    const isMine=m.username===currentUser.username;
    const ts=formatChatTimestamp(m.timestamp);
    const roleLabel=m.role==='teacher'?_('settingsTeacher'):_('settingsStudent');
    return`<div class="chat-msg ${isMine?'mine':''}"><div class="cm-header"><span class="cm-name">${m.username}</span><span class="cm-role ${m.role}">${roleLabel}</span><span class="cm-time">${ts}</span></div><div class="cm-body" onpointerdown="startChatLongPress(event,${idx})" onpointerup="cancelChatLongPress()" onpointerleave="cancelChatLongPress()" onpointercancel="cancelChatLongPress()" onpointermove="cancelChatLongPress()" oncontextmenu="event.preventDefault();deleteChatMessage(${idx})">${escapeHtml(m.message)}</div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getChatMessageKey(m){
  return m.id||[m.timestamp||'',m.username||'',m.role||'',m.message||''].join('|');
}

function getHiddenChatSet(){
  const u=currentUser&&currentUser.username;
  const hidden=(appData.hiddenChatMessages&&u&&appData.hiddenChatMessages[u])||[];
  return new Set(hidden);
}

function formatChatTimestamp(ts){
  const d=new Date(ts);
  if(isNaN(d))return '';
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  const m=d.getMonth(), day=d.getDate();
  if(lang==='en'){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[m]} ${day} ${hh}:${mm}`;
  }
  if(lang==='it'){
    const months=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    return `${day} ${months[m]} ${hh}:${mm}`;
  }
  return `${m+1}月${day}日 ${hh}:${mm}`;
}

function startChatLongPress(event,idx){
  cancelChatLongPress();
  chatLongPressTimer=setTimeout(()=>{chatLongPressTimer=null;deleteChatMessage(idx);},650);
}

function cancelChatLongPress(){
  if(chatLongPressTimer){clearTimeout(chatLongPressTimer);chatLongPressTimer=null;}
}

async function deleteChatMessage(idx){
  cancelChatLongPress();
  if(!appData.chatMessages||!appData.chatMessages[idx])return;
  if(!confirm(_('confirmDeleteChat')))return;
  const before=cloneData(appData);
  const key=getChatMessageKey(appData.chatMessages[idx]);
  if(!appData.hiddenChatMessages)appData.hiddenChatMessages={};
  const u=currentUser.username;
  if(!appData.hiddenChatMessages[u])appData.hiddenChatMessages[u]=[];
  if(!appData.hiddenChatMessages[u].includes(key))appData.hiddenChatMessages[u].push(key);
  saveLocalData();renderChatMessages();showLoading(_('syncing'));
  try{await saveData('隐藏聊天:'+currentUser.username);updateSyncStatus(true);showToast(_('chatDeleted'));}
  catch(e){appData=before;saveLocalData();renderChatMessages();updateSyncStatus(false);showToast(_('syncFail'));}
  hideLoading();
}

async function sendChat(){
  const input=document.getElementById('chatInput');const msg=input.value.trim();if(!msg)return;input.value='';
  if(!appData.chatMessages)appData.chatMessages=[];
  appData.chatMessages.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,8),username:currentUser.username,role:currentUser.role,message:msg,timestamp:new Date().toISOString()});
  if(appData.chatMessages.length>CHAT_MAX)appData.chatMessages=appData.chatMessages.slice(-CHAT_MAX);
  saveLocalData();renderChatMessages();
  try{await saveData('聊天:'+currentUser.username);}catch(e){setTimeout(async()=>{try{await saveData('聊天(重试):'+currentUser.username);}catch(e){}},5000);}
}

async function refreshChat(){
  showLoading(_('syncing'));
  try{await fetchDataFromApi();if(!appData.chatMessages)appData.chatMessages=[];updateSyncStatus(true);}
  catch(e){try{await fetchData();if(!appData.chatMessages)appData.chatMessages=[];updateSyncStatus(true);}catch(e2){updateSyncStatus(false);showToast(_('syncFail'));}}
  hideLoading();
  renderChatMessages();
}

function startChatPoll(){
  if(chatTimer)clearInterval(chatTimer);
  chatTimer=setInterval(async()=>{try{await fetchData();if(!appData.chatMessages)appData.chatMessages=[];renderChatMessages();updateSyncStatus(true);}catch(e){}},5000);
}

// ===== UTILS =====
function getToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getTodayStartISO(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString();}
function formatDate(ds){
  const d=new Date(ds+'T00:00:00');
  const dayNames={'zh-CN':['日','一','二','三','四','五','六'],'en':['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],'it':['Dom','Lun','Mar','Mer','Gio','Ven','Sab']};
  const months={'zh-CN':(m)=>m+'月','en':(m)=>['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1],'it':(m)=>['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'][m-1]};
  const fmt=lang==='en'?`${months.en(d.getMonth()+1)} ${d.getDate()}, ${dayNames.en[d.getDay()]}`:lang==='it'?`${d.getDate()} ${months.it(d.getMonth()+1)}, ${dayNames.it[d.getDay()]}`:`${d.getMonth()+1}月${d.getDate()}日 周${dayNames['zh-CN'][d.getDay()]}`;
  return fmt;
}

function spawnConfetti(){const c=document.getElementById('confettiContainer');const em=['🎉','🌟','✨','🇮🇹','🍕','🎊','💚','🤍','❤️','🌹','⭐','🎈'];for(let i=0;i<30;i++){const p=document.createElement('span');p.className='confetti-piece';p.textContent=em[Math.floor(Math.random()*em.length)];p.style.left=Math.random()*100+'%';p.style.animationDuration=(Math.random()*2+2)+'s';p.style.animationDelay=Math.random()*.5+'s';c.appendChild(p);setTimeout(()=>p.remove(),3500);}}
